services:
  council:
    build: .
    container_name: council-os
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - SEARXNG_BASE_URL=http://searxng:8080
      - COUNCIL_MEMORY_DIR=/data/council_memory
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - council-memory:/data/council_memory
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app
    command: uvicorn api:app --host 0.0.0.0 --port 8000

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - open-webui:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8081:8080"                     # 8081 on host to avoid conflict with OpenWebUI
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml

  smoke-tests:
    image: python:3.12-slim
    profiles: ["smoke"]
    working_dir: /tests
    volumes:
      - ./tests:/tests:ro
    environment:
      - COUNCIL_BASE_URL=http://council:8000
      - COUNCIL_SMOKE_TIMEOUT=90
    command: python smoke_test_council.py
    depends_on:
      - council

volumes:
  open-webui:
  council-memory: