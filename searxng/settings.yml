use_default_settings:
  engines:
    remove:
      - ahmia
      - torch

general:
  debug: false
  instance_name: "My Private SearXNG"

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  limiter: false
  secret_key: "your-random-secret-key-here"   # change this

ui:
  static_use_hash: true

outgoing:
  request_timeout: 3.0